site_name: AI Engineer Learning Hub
site_description: Principal-level study notes for AI-era engineers — clustered, cross-linked, and sourced.
site_author: Anuj Sadani
site_url: https://asadani.github.io/ai-engineer-learning-hub/
docs_dir: docs
copyright: >
  © 2026 <a href="https://asadani.github.io/">Anuj Sadani</a> —
  content licensed <a href="https://creativecommons.org/licenses/by/4.0/">CC BY 4.0</a>
  (free to share & adapt with attribution)

extra_css:
  - assets/extra.css

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.instant
    - navigation.instant.progress
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.tooltips

plugins:
  - search
  - awesome-pages
# PDF export is intentionally NOT here: the with-pdf plugin imports WeasyPrint
# at startup, which would break `mkdocs serve` / local builds without system
# libs. The combined PDF is built in CI via the separate `mkdocs.pdf.yml`.

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      base_path: ["docs"]
      auto_append: ["includes/abbreviations.md"]
      check_paths: true

validation:
  omitted_files: warn
  absolute_links: ignore
  unrecognized_links: ignore
  anchors: ignore

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/asadani/ai-engineer-learning-hub
      name: Source on GitHub
    - icon: material/web
      link: https://asadani.github.io/
      name: asadani.github.io
